			}
			
			.columns {
			width: 100%;
			}
			
			.column-1, .column-2 {
			width:100%;
			}
			
			@media (min-width: 48em) {
			.column-1 {
			width: 70%;
			height: 500px;
			float:left;
			}
			
			.column-2 {
			width: 28%;
			margin: 5px;
			padding: 5px;
			background-color: #decddd;
			
			float:right;
			}
			
			.columns {
			content:"";
			display: table;
			clear: both;
			}
			}
			
			.priceBox {
			margin: 5px;
			padding: 5px;
			background-color: #decddd;
			min-width: 31%;
			float: left;
			}
